name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  tests:
    name: Test (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ["8.2", "8.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_sqlite, json
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        run: vendor/bin/phpunit

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run lint
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

  audit:
    name: Audit dependencies
    runs-on: ubuntu-latest
    # Non-blocking on purpose: a new advisory must surface, not stop a release.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # `--no-dev` is deliberately NOT passed: this package requires only php
      # and a few extensions at runtime, so a runtime-only audit has nothing to
      # look at. What is worth watching here is the build-time supply chain
      # (phpunit, php-cs-fixer, testbench), which is exactly the dev tree.
      - name: Audit
        run: composer audit --abandoned=report
