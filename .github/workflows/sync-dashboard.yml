name: Sync Dashboard UI

on:
  repository_dispatch:
    types: [dashboard-ui-updated]

jobs:
  sync:
    name: Fetch and embed updated UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GH_PAT }}

      - name: Fetch latest ui.html from dashboard-ui
        run: |
          curl -sSfL \
            "https://raw.githubusercontent.com/APIForge-Organisation/dashboard-ui/main/ui.html" \
            -o /tmp/ui.html

      - name: Embed HTML into Dashboard.php
        run: |
          php - /tmp/ui.html src/Dashboard.php << 'PHPEOF'
          <?php
          [$htmlFile, $phpFile] = array_slice($argv, 1, 2);
          $html    = file_get_contents($htmlFile);
          $b64     = base64_encode($html);
          $content = file_get_contents($phpFile);
          $start   = '// <<DASHBOARD_UI_START>>';
          $end     = '// <<DASHBOARD_UI_END>>';
          $block   = "$start\n    private const HTML_B64 = '$b64';\n    $end";
          $new     = preg_replace(
              '/' . preg_quote($start, '/') . '.*?' . preg_quote($end, '/') . '/s',
              $block,
              $content
          );
          file_put_contents($phpFile, $new);
          echo "Dashboard.php updated.\n";
          PHPEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/Dashboard.php
          if git diff --staged --quiet; then
            echo "No changes — already up to date."
          else
            git commit -m "chore: sync dashboard UI from dashboard-ui@${{ github.event.client_payload.sha }}"
            git push origin dev
            echo "Pushed updated Dashboard.php to dev."
          fi
